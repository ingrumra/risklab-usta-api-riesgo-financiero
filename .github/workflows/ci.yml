name: CI – RiskLab USTA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy .env for tests
        run: |
          cp .env.example .env
          echo "FRED_API_KEY=" >> .env

      - name: Run pytest
        env:
          PYTHONPATH: backend
        run: |
          pytest tests/ -v --tb=short --timeout=120

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile -t risklab-usta:latest .
          echo "✅ Docker image built successfully"

      - name: Test Docker image health
        run: |
          docker run -d -p 8000:8000 --name risklab_test risklab-usta:latest
          sleep 10
          curl -f http://localhost:8000/ || exit 1
          docker stop risklab_test
